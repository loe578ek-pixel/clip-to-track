<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1905C8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TKPlaylist</title>
    <meta name="description" content="Extract audio from video files, create playlists, and manage your audio collection with this modern web app.">
    <meta name="author" content="TKPlaylist" />

    <meta property="og:title" content="TKPlaylist - Extract Audio from Videos" />
    <meta property="og:description" content="Extract audio from video files, create playlists, and manage your audio collection with this modern web app." />

    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />

  </head>

  <body style="margin: 0; padding: 0;">
    <div id="root"></div>
    
    <!-- Error display for debugging -->
    <div id="error-display" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: orange; color: black; padding: 20px; font-family: monospace; font-size: 14px; overflow: auto; z-index: 99999;"></div>
    
    <script>
      // Catch all errors
      window.addEventListener('error', function(e) {
        const errorDiv = document.getElementById('error-display');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML += '<div style="margin-bottom: 10px; border-bottom: 1px solid black; padding-bottom: 10px;"><strong>ERROR:</strong> ' + e.message + '<br><strong>File:</strong> ' + e.filename + '<br><strong>Line:</strong> ' + e.lineno + '</div>';
      });
      
      window.addEventListener('unhandledrejection', function(e) {
        const errorDiv = document.getElementById('error-display');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML += '<div style="margin-bottom: 10px; border-bottom: 1px solid black; padding-bottom: 10px;"><strong>PROMISE ERROR:</strong> ' + e.reason + '</div>';
      });
      
      console.log('🚀 Starting to load React...');
    </script>
    
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
